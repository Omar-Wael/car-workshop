<div class="min-h-screen bg-gray-50" dir="rtl">
  <!-- Header -->
  <header
    class="bg-gradient-to-l from-blue-700 to-blue-900 text-white shadow-lg"
  >
    <div
      class="max-w-screen-2xl mx-auto px-4 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <span class="text-3xl">🚗</span>
        <div>
          <h1 class="text-xl font-bold tracking-wide">نظام إدارة المركبات</h1>
          <p class="text-blue-200 text-xs">Vehicle Management System</p>
        </div>
      </div>
      <div class="text-sm text-blue-200">
        {{ today | date: "EEEE، d MMMM y" : "" : "ar" }}
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
    <div class="max-w-screen-2xl mx-auto px-2">
      <div class="flex overflow-x-auto gap-1 py-1 scrollbar-hide">
        @for (tab of tabs; track tab.id) {
          <button
            (click)="setActiveTab(tab.id)"
            [class]="
              activeTab() === tab.id
                ? 'flex items-center gap-1.5 px-3 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white whitespace-nowrap transition-all'
                : 'flex items-center gap-1.5 px-3 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100 whitespace-nowrap transition-all'
            "
          >
            <span>{{ tab.icon }}</span>
            <span>{{ tab.label }}</span>
          </button>
        }
      </div>
    </div>
  </nav>

  <!-- Content — hidden keeps components alive, preserving their state -->
  <main class="max-w-screen-2xl mx-auto px-4 py-6">
    <app-vehicles [hidden]="activeTab() !== 'vehicles'" />
    <app-spare-parts [hidden]="activeTab() !== 'spare-parts'" />
    <app-maintenance [hidden]="activeTab() !== 'maintenance'" />
    <app-overhauls [hidden]="activeTab() !== 'overhauls'" />
    <app-check [hidden]="activeTab() !== 'checks'" />
    <app-invoices [hidden]="activeTab() !== 'invoices'" />
    <app-technicians [hidden]="activeTab() !== 'technicians'" />
    <app-departments [hidden]="activeTab() !== 'departments'" />
    <app-engines [hidden]="activeTab() !== 'engines'" />
    <app-catalog [hidden]="activeTab() !== 'catalog'" />
    <app-daily-notes [hidden]="activeTab() !== 'daily-notes'" />
    <app-stats [hidden]="activeTab() !== 'stats'" />
  </main>
</div>
